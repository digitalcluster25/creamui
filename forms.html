<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forms</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,opsz,wght@0,9..40,100..900;1,9..40,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/tokens.css">
<link rel="stylesheet" href="/elements.css">
<link rel="stylesheet" href="/blocks.css">
</head>
<body>
<div class="demo-page">
  <h1 class="demo-title">Forms</h1>

  <div class="demo-section">
    <div class="demo-row">
      <div class="demo-col" style="width:300px">
        <div class="field-group">
          <label class="field-label">Your first name</label>
          <input class="text-field" type="text" placeholder="John">
        </div>
        <div class="field-group">
          <label class="field-label">Your email address</label>
          <input class="text-field" type="email" placeholder="john@email.com">
        </div>
        <div class="field-group">
          <label class="field-label">With hint</label>
          <input class="text-field" type="text" placeholder="username">
          <span class="field-hint">Only letters and numbers</span>
        </div>
        <div class="field-group">
          <label class="field-label">With error</label>
          <input class="text-field -error" type="email" value="not-valid">
          <span class="field-error">Please enter a valid email</span>
        </div>
        <div class="field-group">
          <label class="field-label">Disabled</label>
          <input class="text-field" type="text" placeholder="Disabled" disabled>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <div class="field-group" style="max-width:440px">
      <label class="field-label">Message</label>
      <textarea class="text-field" placeholder="Write your message here..."></textarea>
    </div>
  </div>

  <div class="demo-section">
    <div style="background:#282828;padding:1.5rem;border-radius:14px;max-width:440px">
      <input class="search-field-dark" type="text" placeholder="Search...">
    </div>
  </div>

  <div class="demo-section">
    <div class="demo-col" style="gap:0.75rem">
      <label class="check-row">
        <input type="checkbox" checked>
        <span>I agree that the data provided may be processed and used for the purpose of sending the newsletter.</span>
      </label>
      <label class="check-row">
        <input type="checkbox">
        <span>Unchecked checkbox</span>
      </label>
      <label class="check-row">
        <input type="radio" name="demo" checked>
        <span>Radio option A</span>
      </label>
      <label class="check-row">
        <input type="radio" name="demo">
        <span>Radio option B</span>
      </label>
    </div>
  </div>

  <div class="demo-section">
    <div class="form-card">
      <div class="field-group">
        <label class="field-label">Your first name</label>
        <input class="text-field" type="text" placeholder="">
      </div>
      <div class="field-group">
        <label class="field-label">Your email address</label>
        <input class="text-field" type="email" placeholder="">
      </div>
      <div class="field-group" style="margin-top:1rem">
        <label class="check-row">
          <input type="checkbox">
          <span>I agree that the data provided may be processed and used for the purpose of sending the newsletter.</span>
        </label>
      </div>
      <div style="margin-top:1.5rem">
        <button class="button" style="width:100%">Subscribe</button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <div class="form-card-dark">
      <div class="field-group">
        <label class="field-label">Your first name</label>
        <input class="text-field" type="text" placeholder="">
      </div>
      <div class="field-group">
        <label class="field-label">Your email address</label>
        <input class="text-field" type="email" placeholder="">
      </div>
      <div class="field-group" style="margin-top:1rem">
        <label class="check-row">
          <input type="checkbox">
          <span>I agree that the data provided may be processed and used for the purpose of sending the newsletter.</span>
        </label>
      </div>
      <div style="margin-top:1.5rem">
        <button class="button">Subscribe</button>
      </div>
    </div>
  </div>
</div>
<script src="/nav.js?v=7"></script>
</body>
</html>

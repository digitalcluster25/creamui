services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_WP_GRAPHQL_URL: ${NEXT_PUBLIC_WP_GRAPHQL_URL}
    container_name: hws-staging-frontend
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.hws-staging.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.hws-staging.rule: "Host(`${STAGING_HOST:-staging.hws.shopping}`)"
      traefik.http.routers.hws-staging.tls: "true"
      traefik.http.routers.hws-staging.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      traefik.http.services.hws-staging.loadbalancer.server.port: "3000"
    networks:
      - default
      - wpsandbox_internal

networks:
  wpsandbox_internal:
    external: true

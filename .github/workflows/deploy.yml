name: Deploy HWS frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "ops/hws/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-hws-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy frontend to HWS
        env:
          HWS_HOST: ${{ secrets.DEPLOY_HOST }}
          HWS_USER: ${{ secrets.DEPLOY_USER }}
        run: ./ops/hws/deploy-frontend.sh

      - name: Verify homepage
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 2 \
            https://hwsstore.spaces.community/ > /dev/null

name: Deploy HWS frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "ops/hws/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-hws-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        env:
          HWS_SSH_KEY: ${{ secrets.HWS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$HWS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HWS_PORT || 22 }}" -H "${{ secrets.HWS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy frontend to HWS
        env:
          HWS_HOST: ${{ secrets.HWS_HOST }}
          HWS_USER: ${{ secrets.HWS_USER }}
          HWS_PORT: ${{ secrets.HWS_PORT }}
          HWS_REMOTE_DIR: ${{ secrets.HWS_REMOTE_DIR }}
          HWS_PM2_APP: ${{ secrets.HWS_PM2_APP }}
        run: ./ops/hws/deploy-frontend.sh

      - name: Verify homepage
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 2 \
            https://hwsstore.spaces.community/ > /dev/null

name: HWS staging E2E

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "ops/hws/staging/**"
      - ".github/workflows/e2e-staging.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hws-staging-e2e
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          HWS_SSH_KEY: ${{ secrets.HWS_SSH_KEY }}
          HWS_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HWS_HOST: ${{ secrets.HWS_HOST || '69.62.121.157' }}
          HWS_PORT: ${{ secrets.HWS_PORT || '22' }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$HWS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "$HWS_KNOWN_HOSTS" ]; then
            printf '%s\n' "$HWS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$HWS_PORT" -H "$HWS_HOST" > ~/.ssh/known_hosts
          fi

      - name: Deploy staging frontend
        env:
          HWS_HOST: ${{ secrets.HWS_HOST || '69.62.121.157' }}
          HWS_USER: ${{ secrets.HWS_USER || 'root' }}
          HWS_PORT: ${{ secrets.HWS_PORT || '22' }}
          HWS_STAGING_HOST: staging.hws.shopping
          HWS_STAGING_WP_GRAPHQL_URL: https://wpsandbox.spaces.community/graphql
          HWS_STAGING_SITE_URL: https://staging.hws.shopping
          NEXT_REVALIDATE_SECRET: ${{ secrets.NEXT_REVALIDATE_SECRET }}
        run: ./ops/hws/deploy-staging.sh

      - name: Verify staging health
        run: curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 3 https://staging.hws.shopping/api/health

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix frontend ci
          npx playwright install --with-deps chromium

      - name: Run Playwright against staging
        env:
          CI: true
          E2E_BASE_URL: https://staging.hws.shopping
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hws-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

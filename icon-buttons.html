<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Buttons</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,opsz,wght@0,9..40,100..900;1,9..40,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
:root {
  --clb-color-primary:   #3e5759;
  --clb-color-button:    #282828;
  --clb-color-fill:      rgba(136,136,137,0.05);
  --clb-color-neutral:   color-mix(in srgb, #111013 50%, white);
  --clb-circle:          3.5rem;
  --clb-circle-small:    3rem;
  --clb-circle-extra-small: 2.5rem;
  --clb-transition-function: cubic-bezier(.645,.045,.355,1);
  --clb-transition-duration: .35s;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; font-size: 16px; background: #f4f1e9; color: #282828; -webkit-font-smoothing: antialiased; }
.page { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 6rem; }

/* ICON BUTTON из style.css */
.icon-button { position: relative; background-color: transparent; padding: 0; border: none; text-align: center; outline: none; cursor: pointer; min-width: var(--clb-circle); width: var(--clb-circle); height: var(--clb-circle); display: inline-flex; vertical-align: middle; align-items: center; justify-content: center; border-radius: 50%; transition: background-color var(--clb-transition-function) var(--clb-transition-duration); color: rgba(40,40,40,0.85); text-decoration: none; flex-shrink: 0; }
.icon-button .icon { display: inline-flex; align-items: center; transition: transform var(--clb-transition-function) var(--clb-transition-duration), opacity var(--clb-transition-function) var(--clb-transition-duration); }
.icon-button svg { fill: currentColor; transform: scale(.9); }
.icon-button:hover, .icon-button.cart { background-color: var(--clb-color-fill); }
.icon-button:hover .icon { opacity: 0.75; }
.icon-button.-small { min-width: var(--clb-circle-small); width: var(--clb-circle-small); height: var(--clb-circle-small); }
.icon-button.-extra-small { min-width: var(--clb-circle-extra-small); width: var(--clb-circle-extra-small); height: var(--clb-circle-extra-small); }
.icon-button.-large { min-width: 4rem; width: 4rem; height: 4rem; }
.icon-button.-filled { background-color: var(--clb-color-button); color: white; }
.icon-button.-filled:hover { background-color: var(--clb-color-primary); color: white; }
.icon-button.-light { color: white; }
.icon-button.-light:hover { background-color: rgba(255,255,255,0.15); }
.icon-button .count-badge { position: absolute; top: 2px; right: 2px; min-width: 20px; height: 20px; background: var(--clb-color-button); color: white; font-size: 11px; font-weight: 700; font-family: 'Urbanist', sans-serif; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0 4px; line-height: 1; }

/* SCROLL TO TOP */
.scroll-to-top { display: inline-flex; align-items: center; gap: 1rem; cursor: pointer; color: rgba(40,40,40,0.85); text-decoration: none; font-family: 'Urbanist', sans-serif; font-weight: 600; font-size: 0.95rem; transition: color var(--clb-transition-function) var(--clb-transition-duration); }
.scroll-to-top:hover { color: var(--clb-color-primary); }
.scroll-to-top:hover .icon-button { background-color: var(--clb-color-button); color: white; }

/* SOCIAL BAR */
.social-bar-holder { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-family: 'Urbanist', sans-serif; }
.social-bar-holder .caption { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(40,40,40,0.35); }
.social-bar-holder a { color: rgba(40,40,40,0.85); text-decoration: none; font-weight: 700; font-size: 0.85rem; transition: color var(--clb-transition-function) var(--clb-transition-duration); }
.social-bar-holder a:hover { color: var(--clb-color-primary); }
.social-bar-divider { color: rgba(40,40,40,0.2); font-size: 0.8rem; }

/* HAMBURGER — CSS lines, оригинал Ohio */
.icon-button.hamburger > .icon {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
}
.icon-button.hamburger > .icon::before,
.icon-button.hamburger > .icon::after {
  content: "";
  display: block;
  height: 2px;
  margin: 3px 0;
  background-color: currentColor;
}
.icon-button.hamburger > .icon::before { width: 1.375rem; }
.icon-button.hamburger > .icon::after  { width: 1.1rem; }


/* PAGE */
h1 { font-family: 'Urbanist', sans-serif; font-size: 2.25rem; font-weight: 700; color: #111013; letter-spacing: -0.03em; margin-bottom: 30px; }
h1 { margin-bottom: 30px; }
.page-sub { font-size: 0.8rem; color: #999; margin-bottom: 3rem; }
.section { margin-bottom: 2.5rem; }
.section-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #282828; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(0,0,0,0.07); font-family: 'Urbanist', sans-serif; }
.row { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; }
.row--dark { background: #1c1c1c; padding: 1.5rem; border-radius: 14px; }
.col { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
.meta { font-size: 0.65rem; color: #bbb; font-family: monospace; text-align: center; }
</style>
</head>
